# Netlify Configuration for Frontend-Only Deployment
[build]
  command = "bun run build"
  publish = ".next"

# Exclude API routes from being treated as Netlify Functions
[functions]
  included_files = ["!src/app/api/**/*"]

# Redirect all API requests to Dokploy backend
[[redirects]]
  from = "/api/*"
  to = "https://apiv2.harisidham.com/api/:splat"
  status = 200
  force = true

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
